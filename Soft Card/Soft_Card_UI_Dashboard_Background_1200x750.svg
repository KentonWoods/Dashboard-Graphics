<svg width="1200" height="750" viewBox="0 0 1200 750" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>

  <!-- Shadow for KPI cards — very soft, barely lifted -->
  <filter id="shadow-kpi" x="-10%" y="-15%" width="120%" height="145%">
    <feDropShadow dx="0" dy="2" stdDeviation="7" flood-color="#8090C0" flood-opacity="0.10"/>
  </filter>

  <!-- Shadow for main content cards — slightly more depth -->
  <filter id="shadow-card" x="-6%" y="-5%" width="112%" height="120%">
    <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#7080B8" flood-opacity="0.09"/>
  </filter>

  <!-- Shadow for the nav bar -->
  <filter id="shadow-nav" x="0%" y="0%" width="100%" height="400%">
    <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#7080B8" flood-opacity="0.08"/>
  </filter>

  <!-- Shadow for tall bottom cards — deepest of the three -->
  <filter id="shadow-tall" x="-5%" y="-3%" width="110%" height="115%">
    <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#6878B0" flood-opacity="0.10"/>
  </filter>

  <clipPath id="clip0">
    <rect width="1200" height="750"/>
  </clipPath>

</defs>

<g clip-path="url(#clip0)">

  <!-- ═══════════════════════════════════════════════════════
       PAGE BACKGROUND
       Soft cool gray-blue — the "application canvas"
       that cards sit on top of
  ═══════════════════════════════════════════════════════ -->
  <rect width="1200" height="750" fill="#E8EBF4"/>


  <!-- ═══════════════════════════════════════════════════════
       NAV BAR   y=0, h=58
       White card, full width, gentle bottom shadow
       Logo left · Tab cluster center · Controls right
  ═══════════════════════════════════════════════════════ -->
  <rect width="1200" height="58" fill="#FFFFFF" filter="url(#shadow-nav)"/>

  <!-- Logo mark — violet rounded square -->
  <rect x="20" y="11" width="36" height="36" rx="9" fill="#7C6FF0"/>
  <!-- Logo inner detail: two stacked light bars -->
  <rect x="27" y="19" width="14" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.40"/>
  <rect x="27" y="27" width="9"  height="4" rx="2" fill="#FFFFFF" fill-opacity="0.25"/>
  <rect x="27" y="35" width="14" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.40"/>

  <!-- ── Tab cluster ── centered pill container ── -->
  <!-- Container: holds 1 active + 4 inactive tabs -->
  <!-- Width: 330, centered at x=600 → x=435 -->
  <rect x="435" y="12" width="330" height="34" rx="17" fill="#F0F1F8"/>

  <!-- Active tab: filled violet pill -->
  <rect x="441" y="15" width="108" height="28" rx="14" fill="#7C6FF0"/>
  <!-- Active tab icon dot (implies icon + label zone) -->
  <rect x="455" y="24" width="12" height="10" rx="3" fill="#FFFFFF" fill-opacity="0.35"/>

  <!-- Inactive tab icon hints — small centered circles -->
  <rect x="570" y="22" width="14" height="14" rx="7" fill="#D8DAE8"/>
  <rect x="622" y="22" width="14" height="14" rx="7" fill="#D8DAE8"/>
  <rect x="674" y="22" width="14" height="14" rx="7" fill="#D8DAE8"/>
  <rect x="726" y="22" width="14" height="14" rx="7" fill="#D8DAE8"/>

  <!-- ── Right controls ── three icon pill buttons ── -->
  <rect x="1066" y="13" width="32" height="32" rx="16" fill="#F0F1F8"/>
  <rect x="1106" y="13" width="32" height="32" rx="16" fill="#F0F1F8"/>
  <!-- Notification dot on second button -->
  <rect x="1130" y="12" width="8"  height="8"  rx="4"  fill="#7C6FF0"/>
  <!-- Avatar circle — violet tinted -->
  <rect x="1148" y="13" width="32" height="32" rx="16" fill="#EAE8FC"/>
  <rect x="1148" y="13" width="32" height="32" rx="16" fill="none" stroke="#7C6FF0" stroke-width="1.5" stroke-opacity="0.25"/>


  <!-- ═══════════════════════════════════════════════════════
       ROW 1 — KPI CARDS   y=72, h=80
       Four equal-width white cards, lifted softly
  ═══════════════════════════════════════════════════════ -->
  <!-- Card 1  x=20  -->
  <rect x="20"  y="72" width="281" height="80" rx="14" fill="#FFFFFF" filter="url(#shadow-kpi)"/>
  <!-- Violet top accent pip — small, centered, understated -->
  <rect x="20"  y="72" width="281" height="3"  rx="1.5" fill="#7C6FF0" fill-opacity="0.70"/>

  <!-- Card 2  x=313 -->
  <rect x="313" y="72" width="281" height="80" rx="14" fill="#FFFFFF" filter="url(#shadow-kpi)"/>
  <rect x="313" y="72" width="281" height="3"  rx="1.5" fill="#7C6FF0" fill-opacity="0.70"/>

  <!-- Card 3  x=606 -->
  <rect x="606" y="72" width="281" height="80" rx="14" fill="#FFFFFF" filter="url(#shadow-kpi)"/>
  <rect x="606" y="72" width="281" height="3"  rx="1.5" fill="#7C6FF0" fill-opacity="0.70"/>

  <!-- Card 4  x=899 -->
  <rect x="899" y="72" width="281" height="80" rx="14" fill="#FFFFFF" filter="url(#shadow-kpi)"/>
  <rect x="899" y="72" width="281" height="3"  rx="1.5" fill="#7C6FF0" fill-opacity="0.70"/>


  <!-- ═══════════════════════════════════════════════════════
       ROW 2 — MAIN CONTENT   y=164, h=258
       Large left card + two stacked right cards
  ═══════════════════════════════════════════════════════ -->

  <!-- Large left card  x=20, w=762, h=258 -->
  <rect x="20"  y="164" width="762" height="258" rx="14" fill="#FFFFFF" filter="url(#shadow-card)"/>
  <!-- Inner header zone separator -->
  <rect x="20"  y="204" width="762" height="1"   fill="#F2F3F8"/>

  <!-- Right column top card  x=796, y=164, w=384, h=123 -->
  <rect x="796" y="164" width="384" height="123" rx="14" fill="#FFFFFF" filter="url(#shadow-kpi)"/>
  <!-- Inner header zone separator -->
  <rect x="796" y="204" width="384" height="1"   fill="#F2F3F8"/>

  <!-- Right column bottom card  x=796, y=299, w=384, h=123 -->
  <rect x="796" y="299" width="384" height="123" rx="14" fill="#FFFFFF" filter="url(#shadow-kpi)"/>
  <!-- Inner header zone separator -->
  <rect x="796" y="339" width="384" height="1"   fill="#F2F3F8"/>


  <!-- ═══════════════════════════════════════════════════════
       ROW 3 — TALL CARDS   y=434, h=304
       Three equal-width cards, the deepest content zone
  ═══════════════════════════════════════════════════════ -->

  <!-- Card A  x=20,  w=377 -->
  <rect x="20"  y="434" width="377" height="304" rx="14" fill="#FFFFFF" filter="url(#shadow-tall)"/>
  <!-- Inner header separator -->
  <rect x="20"  y="474" width="377" height="1"   fill="#F2F3F8"/>

  <!-- Card B  x=411, w=377 -->
  <rect x="411" y="434" width="377" height="304" rx="14" fill="#FFFFFF" filter="url(#shadow-tall)"/>
  <rect x="411" y="474" width="377" height="1"   fill="#F2F3F8"/>

  <!-- Card C  x=802, w=378 -->
  <rect x="802" y="434" width="378" height="304" rx="14" fill="#FFFFFF" filter="url(#shadow-tall)"/>
  <rect x="802" y="474" width="378" height="1"   fill="#F2F3F8"/>

</g>

</svg>
