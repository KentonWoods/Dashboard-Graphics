<svg width="1200" height="750" viewBox="0 0 1200 750" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>
  <clipPath id="clip0">
    <rect width="1200" height="750"/>
  </clipPath>
</defs>

<g clip-path="url(#clip0)">

  <!-- BACKGROUND — warm cream -->
  <rect width="1200" height="750" fill="#F6F3EE"/>


  <!-- ═══════════════════════════════════════
       MASTHEAD   y=0 to y=72
  ═══════════════════════════════════════ -->
  <rect width="1200" height="72" fill="#FFFFFF"/>
  <!-- Signature left accent rule -->
  <rect x="0" y="0" width="4" height="72" fill="#9B4031"/>
  <!-- Logo mark top-right -->
  <rect x="1148" y="16" width="28" height="40" rx="2" fill="#9B4031" fill-opacity="0.90"/>
  <!-- Thin vertical rule separating logo from content -->
  <rect x="1128" y="16" width="1" height="40" fill="#CFC9C0"/>
  <!-- Masthead bottom rule -->
  <rect y="72" width="1200" height="2" fill="#B5AFA6"/>


  <!-- ═══════════════════════════════════════
       DECK / FILTER BAR   y=74 to y=114
  ═══════════════════════════════════════ -->
  <!-- Filter pills — right-aligned, minimal -->
  <rect x="906" y="83" width="100" height="22" rx="3" fill="#FFFFFF" stroke="#CFC9C0" stroke-width="0.75"/>
  <rect x="1016" y="83" width="100" height="22" rx="3" fill="#FFFFFF" stroke="#CFC9C0" stroke-width="0.75"/>
  <!-- Active / accent pill -->
  <rect x="1126" y="83" width="50" height="22" rx="3" fill="#9B4031" fill-opacity="0.88"/>
  <!-- Deck bottom hairline -->
  <rect y="114" width="1200" height="1" fill="#CFC9C0"/>


  <!-- ═══════════════════════════════════════
       LEAD SECTION   y=114 to y=380
       Left: dominant chart panel
       Right: annotation column
  ═══════════════════════════════════════ -->

  <!-- Lead chart panel — white, sharp corners -->
  <rect x="0" y="114" width="828" height="266" fill="#FFFFFF" stroke="#E0DAD2" stroke-width="0.75"/>
  <!-- Inner title zone separator -->
  <rect x="0" y="152" width="828" height="1" fill="#EDE8E0"/>

  <!-- Column rule dividing lead panel from annotation -->
  <rect x="832" y="114" width="1" height="266" fill="#CFC9C0"/>

  <!-- Pull-quote block — annotation column right -->
  <rect x="852" y="184" width="328" height="78" rx="2" fill="#F0EDE6"/>
  <!-- Pull-quote left accent rule -->
  <rect x="852" y="184" width="3" height="78" rx="1" fill="#9B4031"/>


  <!-- ═══════════════════════════════════════
       SECTION BREAK   y=380 to y=423
  ═══════════════════════════════════════ -->

  <!-- Terracotta section rule -->
  <rect y="380" width="1200" height="2" fill="#9B4031" fill-opacity="0.70"/>
  <!-- Section numeral accent block -->
  <rect x="0" y="388" width="4" height="26" fill="#9B4031"/>
  <rect x="14" y="388" width="34" height="21" rx="1" fill="#9B4031" fill-opacity="0.12"/>
  <!-- Section break bottom hairline -->
  <rect y="423" width="1200" height="1" fill="#CFC9C0"/>


  <!-- ═══════════════════════════════════════
       BODY SECTION   y=423 to y=612
       Left margin strip + two content panels
  ═══════════════════════════════════════ -->

  <!-- Left editorial margin rule -->
  <rect x="192" y="423" width="1" height="189" fill="#CFC9C0"/>

  <!-- Body panel left -->
  <rect x="204" y="423" width="480" height="189" fill="#FFFFFF" stroke="#E0DAD2" stroke-width="0.75"/>
  <!-- Inner title zone separator -->
  <rect x="204" y="463" width="480" height="1" fill="#EDE8E0"/>

  <!-- Column rule between body panels -->
  <rect x="696" y="423" width="1" height="189" fill="#CFC9C0"/>

  <!-- Body panel right -->
  <rect x="708" y="423" width="492" height="189" fill="#FFFFFF" stroke="#E0DAD2" stroke-width="0.75"/>
  <!-- Inner title zone separator -->
  <rect x="708" y="463" width="492" height="1" fill="#EDE8E0"/>

  <!-- Body section bottom rule -->
  <rect y="612" width="1200" height="1" fill="#CFC9C0"/>


  <!-- ═══════════════════════════════════════
       FOOTER BAND   y=612 to y=738
  ═══════════════════════════════════════ -->
  <rect y="612" width="1200" height="126" fill="#EDE8DF"/>
  <!-- Left accent rule — bookends the masthead -->
  <rect x="0" y="612" width="4" height="126" fill="#9B4031" fill-opacity="0.55"/>
  <!-- Footer content panel -->
  <rect x="24" y="656" width="1152" height="66" fill="#FFFFFF" stroke="#E0DAD2" stroke-width="0.75"/>
  <!-- Inner top rule -->
  <rect x="24" y="674" width="1152" height="1" fill="#EDE8E0"/>
  <!-- Column dividers inside footer panel -->
  <rect x="312" y="656" width="1" height="66" fill="#EDE8E0"/>
  <rect x="600" y="656" width="1" height="66" fill="#EDE8E0"/>
  <rect x="888" y="656" width="1" height="66" fill="#EDE8E0"/>


  <!-- ═══════════════════════════════════════
       PAGE FOOTER   y=738 to y=750
  ═══════════════════════════════════════ -->
  <rect y="738" width="1200" height="12" fill="#E4DFD6"/>
  <rect x="0" y="738" width="4" height="12" fill="#9B4031" fill-opacity="0.55"/>

</g>

</svg>
